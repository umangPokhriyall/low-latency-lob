name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Build, lint, and test the whole workspace. The green gate the repo ships behind.
  build-clippy-test:
    name: build + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build (all targets)
        run: cargo build --workspace --all-targets

      - name: Clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # The lock-free primitives' memory ordering, model-checked by loom under
  # `--cfg loom`. Separate job: loom replaces std atomics and explores thread
  # interleavings, so it is a distinct build of the `sync` crate only.
  loom:
    name: loom (sync memory ordering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Loom model-check the seqlock and ring
        run: cargo test -p sync --test loom_seqlock --test loom_ring
        env:
          RUSTFLAGS: --cfg loom
